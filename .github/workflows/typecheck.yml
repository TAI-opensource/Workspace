name: typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Bun
        uses: ./.github/actions/setup-bun

      - name: Run typecheck
        run: bun turbo typecheck --filter='!@opencode-ai/desktop' --filter='!@opencode-ai/app' --filter='!@opencode-ai/console-*' --filter='!@opencode-ai/function' --filter='!@opencode-ai/stats-*' --filter='!@opencode-ai/slack' --filter='!@opencode-ai/enterprise' --filter='!@opencode-ai/http-recorder' --filter='!@opencode-ai/storybook' --filter='!@opencode-ai/session-ui'
